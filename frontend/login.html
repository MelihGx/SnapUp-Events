<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — SnapUp Events</title>

    <link rel="stylesheet" href="css/auth.css" />
    <link rel="icon" href="icon/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="icon/snapup-favicon.svg" />
    <link rel="apple-touch-icon" href="icon/apple-touch-icon.png" />
    <link rel="manifest" href="icon/site.webmanifest" />
    <meta name="theme-color" content="#0D0B0A" />
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-layout" aria-label="SnapUp login page">
        <div class="auth-visual" aria-hidden="true">
          <a href="index.html" class="auth-brand">
            <span class="auth-brand-mark">
              <svg
                class="auth-logo-svg"
                viewBox="0 0 48 48"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
              >
                <circle cx="24" cy="24" r="20" fill="#0D0B0A" />
                <circle
                  cx="24"
                  cy="24"
                  r="18.25"
                  stroke="rgba(255,255,255,.16)"
                  stroke-width="1.5"
                />
                <g class="auth-shutter-blades" transform="translate(24 24)">
                  <path d="M0 -10.5 L6.8 -3.6 L1.2 -1.1 Z" fill="#ffffff" />
                  <path d="M9.1 -5.2 L9.8 4.4 L3.6 1.2 Z" fill="#F4EEE4" />
                  <path d="M9.1 5.2 L1.2 10.6 L1.3 3.6 Z" fill="#ffffff" />
                  <path d="M0 10.5 L-6.8 3.6 L-1.2 1.1 Z" fill="#FF6A3D" />
                  <path d="M-9.1 5.2 L-9.8 -4.4 L-3.6 -1.2 Z" fill="#F7B14C" />
                  <path
                    d="M-9.1 -5.2 L-1.2 -10.6 L-1.3 -3.6 Z"
                    fill="#ffffff"
                  />
                </g>
                <circle
                  cx="24"
                  cy="24"
                  r="4.8"
                  fill="#0D0B0A"
                  stroke="#ffffff"
                  stroke-width="1.8"
                />
                <circle cx="24" cy="24" r="1.4" fill="#ffffff" />
              </svg>
            </span>
            <strong>SnapUp<span>Events</span></strong>
          </a>

          <div class="auth-camera-card">
            <div class="auth-rec"><i></i> REC</div>
            <div class="auth-lens">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="auth-visual-text">
              <small>WELCOME BACK</small>
              <h2>Continue managing your event memories.</h2>
              <p>
                Login to access your account, event galleries, guest settings,
                and private uploads.
              </p>
            </div>
          </div>
        </div>

        <section class="auth-card">
          <div class="auth-card-top">
            <a
              href="index.html"
              class="auth-card-brand"
              aria-label="SnapUp Events home"
            >
              <span class="auth-brand-mark auth-brand-mark-light">
                <svg
                  class="auth-logo-svg auth-logo-svg-dark"
                  viewBox="0 0 48 48"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                >
                  <circle cx="24" cy="24" r="20" fill="#0D0B0A" />
                  <circle
                    cx="24"
                    cy="24"
                    r="18.25"
                    stroke="rgba(255,255,255,.16)"
                    stroke-width="1.5"
                  />
                  <g class="auth-shutter-blades" transform="translate(24 24)">
                    <path d="M0 -10.5 L6.8 -3.6 L1.2 -1.1 Z" fill="#ffffff" />
                    <path d="M9.1 -5.2 L9.8 4.4 L3.6 1.2 Z" fill="#F4EEE4" />
                    <path d="M9.1 5.2 L1.2 10.6 L1.3 3.6 Z" fill="#ffffff" />
                    <path d="M0 10.5 L-6.8 3.6 L-1.2 1.1 Z" fill="#FF6A3D" />
                    <path
                      d="M-9.1 5.2 L-9.8 -4.4 L-3.6 -1.2 Z"
                      fill="#F7B14C"
                    />
                    <path
                      d="M-9.1 -5.2 L-1.2 -10.6 L-1.3 -3.6 Z"
                      fill="#ffffff"
                    />
                  </g>
                  <circle
                    cx="24"
                    cy="24"
                    r="4.8"
                    fill="#0D0B0A"
                    stroke="#ffffff"
                    stroke-width="1.8"
                  />
                  <circle cx="24" cy="24" r="1.4" fill="#ffffff" />
                </svg>
              </span>
              <strong>SnapUp<span>Events</span></strong>
            </a>

            <a href="index.html" class="auth-back">Back to home</a>
          </div>

          <div class="auth-head">
            <span>Login</span>
            <h1>Welcome back.</h1>
            <p>Login to manage your SnapUp account and event galleries.</p>
          </div>

          <form class="auth-form" id="loginForm" novalidate>
            <div class="auth-field">
              <label for="loginMail">Email address</label>
              <input
                type="email"
                id="loginMail"
                name="loginMail"
                autocomplete="email"
                required
              />
              <small class="auth-field-error" id="loginMailError"></small>
            </div>

            <div class="auth-field">
              <label for="loginPassword">Password</label>
              <div class="auth-password-row">
                <input
                  type="password"
                  id="loginPassword"
                  name="loginPassword"
                  autocomplete="current-password"
                  required
                />
                <button type="button" id="toggleLoginPassword">Show</button>
              </div>
              <small class="auth-field-error" id="loginPasswordError"></small>
            </div>

            <button type="submit" class="auth-submit" id="loginSubmit">
              Login
            </button>

            <div class="auth-result" id="loginResult" role="status"></div>
          </form>

          <p class="auth-bottom">
            Don't have an account?
            <a href="register.html">Create account</a>
          </p>
        </section>
      </section>
    </main>

    <script type="module" src="js/login.js"></script>
  </body>
</html>
